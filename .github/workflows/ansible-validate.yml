name: Validate Windows Worker Ansible

on:
  workflow_dispatch:
  push:
    paths:
      - 'infra/ansible/**'
      - 'ops/windows-worker/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible pywinrm requests-ntlm requests-credssp

      - name: Install Ansible collections
        working-directory: infra/ansible
        run: ansible-galaxy collection install -r collections/requirements.yml

      - name: Syntax check builder playbook
        working-directory: infra/ansible
        run: ansible-playbook --syntax-check playbooks/bootstrap-builder.yml

      - name: Syntax check worker playbook
        working-directory: infra/ansible
        run: ansible-playbook --syntax-check playbooks/bootstrap-worker.yml
