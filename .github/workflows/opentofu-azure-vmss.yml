name: OpenTofu Azure VMSS

on:
  pull_request:
    branches: [main]
    paths: ['infra/opentofu/azure-vmss/**']
  push:
    branches: [main]
    paths: ['infra/opentofu/azure-vmss/**']
  workflow_dispatch:
    inputs:
      tfvars_file:
        description: Optional repo-relative tfvars file to use
        required: false
        default: infra/opentofu/azure-vmss/example.tfvars
        type: string
      state_key:
        description: Backend state key inside the Azure Blob container
        required: true
        default: card-utility-stats/azure-vmss.tfstate
        type: string
      apply:
        description: Apply the saved plan after planning
        required: true
        default: false
        type: boolean

concurrency:
  group: opentofu-${{ github.event.inputs.state_key || 'card-utility-stats/azure-vmss.tfstate' }}
  cancel-in-progress: false

jobs:
  opentofu:
    name: Plan or apply Azure VMSS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    defaults:
      run:
        shell: bash
        working-directory: infra/opentofu/azure-vmss

    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      ARM_USE_AZUREAD: true
      ARM_USE_OIDC: true
      TF_IN_AUTOMATION: true
      TF_VAR_key_vault_name: ${{ vars.KEY_VAULT_NAME }}
      DEFAULT_TFVARS_FILE: infra/opentofu/azure-vmss/example.tfvars
      DEFAULT_STATE_KEY: card-utility-stats/azure-vmss.tfstate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.10.5
          tofu_wrapper: false

      - name: OpenTofu init
        run: |
          tofu init -input=false \
            -backend-config="resource_group_name=infra" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ github.event.inputs.state_key || 'card-utility-stats/azure-vmss.tfstate' }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: OpenTofu fmt
        run: tofu fmt -check -diff

      - name: OpenTofu validate
        run: tofu validate -no-color

      - name: OpenTofu plan
        env:
          TFVARS_FILE: ${{ github.event.inputs.tfvars_file || 'infra/opentofu/azure-vmss/example.tfvars' }}
        run: |
          set -euo pipefail

          VAR_ARGS=()
          if [[ -n "${TFVARS_FILE}" ]]; then
            VAR_ARGS+=("-var-file=${GITHUB_WORKSPACE}/${TFVARS_FILE}")
          fi

          tofu plan -input=false -no-color -out=tfplan "${VAR_ARGS[@]}"

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = 'infra/opentofu/azure-vmss/tfplan';
            const body = fs.existsSync(planPath)
              ? '### OpenTofu VMSS Plan\nA binary plan artifact was produced for `infra/opentofu/azure-vmss`.\n\nReview the workflow logs and artifact for details.'
              : '### OpenTofu VMSS Plan\nNo plan artifact was produced.';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### OpenTofu VMSS Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload OpenTofu plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opentofu-azure-vmss-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            infra/opentofu/azure-vmss/tfplan
            infra/opentofu/azure-vmss/.terraform.lock.hcl
          if-no-files-found: warn
          retention-days: 14

      - name: OpenTofu apply
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply) }}
        run: tofu apply -input=false -auto-approve tfplan
